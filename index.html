<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      user-select: none;
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: #4ade80;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    #hud {
      display: flex;
      gap: 3rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 0.1em;
    }

    #hud span { color: #fff; font-weight: bold; }
    #combo { transition: color 0.2s, transform 0.15s; display: inline-block; }
    #combo.hot { color: #facc15; transform: scale(1.25); }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #333;
      border-radius: 4px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      border-radius: 4px;
      gap: 1rem;
    }

    #overlay h2 { font-size: 2rem; letter-spacing: 0.2em; }
    #overlay p  { color: #aaa; font-size: 0.85rem; letter-spacing: 0.05em; }

    #overlay button {
      margin-top: 0.5rem;
      padding: 0.6rem 2.4rem;
      background: #4ade80;
      color: #0f0f0f;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s;
    }

    #overlay button:hover { background: #86efac; }

    #hint { margin-top: 0.75rem; font-size: 0.75rem; color: #555; letter-spacing: 0.05em; }

    #ranking { width: 100%; max-width: 240px; }
    #ranking h3 {
      text-align: center; color: #444; letter-spacing: 0.15em;
      font-size: 0.65rem; margin-bottom: 0.4rem;
    }
    #ranking ol { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 3px; }
    #ranking li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.2rem 0.6rem; border-radius: 3px; background: #1a1a1a;
      font-size: 0.75rem; color: #666;
    }
    #ranking li.new { background: #0d2818; color: #4ade80; }
    #ranking li .pos { color: #444; margin-right: 0.4rem; font-size: 0.65rem; }
    #ranking li .pts { color: #fff; font-weight: bold; }
    #ranking li.new .pts { color: #4ade80; }
    #ranking li .meta { font-size: 0.65rem; }

    #speed-selector { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    #speed-selector label { font-size: 0.75rem; color: #666; letter-spacing: 0.12em; }
    #speed-btns { display: flex; gap: 0.3rem; }
    #speed-btns button {
      margin: 0; padding: 0.3rem 0.5rem;
      min-width: 2rem;
      background: #1a1a1a; color: #555;
      border: 1px solid #333; border-radius: 3px;
      font-family: inherit; font-size: 0.8rem; font-weight: bold;
      cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    #speed-btns button:hover { background: #222; color: #aaa; border-color: #555; }
    #speed-btns button.active { background: #166534; color: #4ade80; border-color: #4ade80; }

    #gamepad-status {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    #gamepad-status.on { color: #4ade80; }

    /* ── Mobile / responsive ───────────────────────────────────────────────── */
    #canvas-wrapper {
      width: min(560px, calc(100vw - 8px), calc(100svh - 220px));
      aspect-ratio: 1 / 1;
    }

    canvas { touch-action: none; width: 100%; height: 100%; }

    /* D-pad */
    #dpad {
      display: none;
      margin-top: 1.25rem;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 6px;
    }
    #dpad button {
      background: #1a1a1a;
      color: #4ade80;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #dpad button:active { background: #166534; border-color: #4ade80; }
    #dpad-up    { grid-column: 2; grid-row: 1; }
    #dpad-left  { grid-column: 1; grid-row: 2; }
    #dpad-right { grid-column: 3; grid-row: 2; }
    #dpad-down  { grid-column: 2; grid-row: 3; }

    @media (pointer: coarse), (max-width: 600px) {
      #dpad { display: grid; }
      h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
      #hud { gap: 1rem; font-size: 0.8rem; margin-bottom: 0.5rem; flex-wrap: wrap; justify-content: center; }
      #speed-btns button { min-width: 1.8rem; padding: 0.35rem 0.4rem; font-size: 0.75rem; }
      #overlay button { padding: 0.7rem 2rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="hud">
    SCORE: <span id="score">0</span>
    &nbsp;&nbsp;&nbsp;
    BEST: <span id="best">0</span>
    &nbsp;&nbsp;&nbsp;
    CELLS: <span id="cells">0</span>
    &nbsp;&nbsp;&nbsp;
    COMBO: <span id="combo">x1</span>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>

    <div id="overlay">
      <h2 id="overlay-title" style="color:#4ade80">SNAKE</h2>
      <p id="overlay-msg">Fill the entire grid to win.</p>
      <div id="speed-selector">
        <label>SPEED</label>
        <div id="speed-btns">
          <button data-level="1">1</button>
          <button data-level="2">2</button>
          <button data-level="3">3</button>
          <button data-level="4">4</button>
          <button data-level="5" class="active">5</button>
          <button data-level="6">6</button>
          <button data-level="7">7</button>
          <button data-level="8">8</button>
          <button data-level="9">9</button>
          <button data-level="10">10</button>
        </div>
      </div>
      <div id="ranking"></div>
      <button id="start-btn">START</button>
      <p id="hint">Arrow keys · WASD · Swipe · Gamepad</p>
    </div>
  </div>

  <div id="dpad">
    <button id="dpad-up">▲</button>
    <button id="dpad-left">◀</button>
    <button id="dpad-right">▶</button>
    <button id="dpad-down">▼</button>
  </div>

  <div id="gamepad-status">NO GAMEPAD</div>

<script>
// ── Constants (shared with worker) ───────────────────────────────────────────
const COLS  = 20;
const ROWS  = 20;
const CELL  = 28;
const TOTAL = COLS * ROWS;

// ── DOM ───────────────────────────────────────────────────────────────────────
const canvas       = document.getElementById('canvas');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg   = document.getElementById('overlay-msg');
const startBtn     = document.getElementById('start-btn');
const scoreEl      = document.getElementById('score');
const bestEl       = document.getElementById('best');
const cellsEl      = document.getElementById('cells');
const gpStatus     = document.getElementById('gamepad-status');

canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// ── Worker source (inline blob) ───────────────────────────────────────────────
// Runs entirely on a separate thread — game logic + OffscreenCanvas rendering.
// The main thread only handles input and HUD updates.
const WORKER_SRC = /* js */`
  'use strict';
  const COLS = 20, ROWS = 20, CELL = 28, TOTAL = COLS * ROWS;
  let tickMs = 120;      // set dynamically from 'start' message

  let canvas, ctx;
  let snake, prevSnake, dir, apple, score = 0, best = 0;
  let running = false, lastTick = 0;
  let dirQueue = [];

  // ── Effects state ────────────────────────────────────────────────────────────
  let particles    = [];   // apple explosion particles
  let floatingTexts = [];  // score popup texts
  let currentTs    = 0;    // latest frame timestamp (for effects delta-time)
  let prevTs       = 0;    // previous frame timestamp

  // Combo: eating apples within COMBO_WINDOW_MS of each other chains the combo
  const COMBO_WINDOW_MS = 3000;
  let combo       = 0;
  let lastEatTs   = 0;

  // Death flash: snake flashes red for DEATH_MS before showing overlay
  const DEATH_MS   = 700;
  let dying        = false;
  let dyingStartTs = 0;

  // ── Message router ──────────────────────────────────────────────────────────
  self.onmessage = ({ data }) => {
    switch (data.type) {
      case 'init':
        canvas = data.canvas;
        ctx    = canvas.getContext('2d');
        drawEmpty();
        break;
      case 'start':
        tickMs   = data.tickMs;
        initGame();
        running  = true;
        lastTick = data.ts;
        draw(0);
        break;
      case 'frame': {
        const dt = prevTs ? data.ts - prevTs : 0;
        prevTs    = data.ts;
        currentTs = data.ts;

        // Death flash animation — runs independently of game logic
        if (dying) {
          updateParticles(dt);
          updateFloatingTexts(dt);
          drawDying(data.ts);
          if (data.ts - dyingStartTs >= DEATH_MS) {
            dying = false;
            self.postMessage({ type: 'end', won: false, score, length: snake.length });
          }
          break;
        }

        if (!running) break;
        if (data.dir) enqueue(data.dir);

        if (data.ts - lastTick > tickMs * 8) lastTick = data.ts - tickMs;
        while (running && data.ts - lastTick >= tickMs) {
          prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
          lastTick += tickMs;
          tick();
        }

        updateParticles(dt);
        updateFloatingTexts(dt);

        if (running) {
          const t = (data.ts - lastTick) / tickMs;
          draw(t);
        }
        break;
      }
    }
  };

  // ── Direction queue ─────────────────────────────────────────────────────────
  function enqueue(d) {
    // Reference: last buffered direction (or current direction if queue empty)
    const ref = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
    if (d.x === -ref.x && d.y === -ref.y) return; // block 180° reversal
    if (d.x ===  ref.x && d.y ===  ref.y) return; // ignore duplicate
    if (dirQueue.length < 3) dirQueue.push(d);
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  function initGame() {
    dir           = { x: 1, y: 0 };
    snake         = [{ x: COLS >> 1, y: ROWS >> 1 }];
    prevSnake     = [{ x: COLS >> 1, y: ROWS >> 1 }];
    score         = 0;
    combo         = 0;
    lastEatTs     = 0;
    dirQueue      = [];
    particles     = [];
    floatingTexts = [];
    dying         = false;
    spawnApple();
    postHud();
  }

  // ── Apple ───────────────────────────────────────────────────────────────────
  function spawnApple() {
    // Build occupancy set in O(n), pick random free cell
    const occ  = new Set(snake.map(s => s.y * COLS + s.x));
    const free = [];
    for (let i = 0; i < TOTAL; i++) if (!occ.has(i)) free.push(i);
    if (!free.length) { apple = null; return; }
    const idx = free[(Math.random() * free.length) | 0];
    apple = { x: idx % COLS, y: (idx / COLS) | 0 };
  }

  // ── Tick (one game step) ────────────────────────────────────────────────────
  function tick() {
    if (dirQueue.length) dir = dirQueue.shift();

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(false); return;
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(false); return;
    }

    snake.unshift(head);

    if (apple && head.x === apple.x && head.y === apple.y) {
      // Combo: chain if ate within window
      const timeSinceLast = currentTs - lastEatTs;
      combo = (lastEatTs > 0 && timeSinceLast < COMBO_WINDOW_MS) ? combo + 1 : 1;
      lastEatTs = currentTs;

      const points = combo;
      score += points;
      if (score > best) best = score;

      // Particle explosion at apple position
      const ax = apple.x * CELL + CELL / 2;
      const ay = apple.y * CELL + CELL / 2;
      spawnParticles(ax, ay);

      // Floating score text
      const label = combo > 1 ? \`+\${points} x\${combo}\` : \`+\${points}\`;
      floatingTexts.push({ x: ax, y: ay, text: label, life: 1.0, vy: -1.2, combo });

      postHud();
      spawnApple();
    } else {
      snake.pop();
    }

    if (snake.length === TOTAL) { draw(1); endGame(true); }
  }

  // ── End ─────────────────────────────────────────────────────────────────────
  function endGame(won) {
    running = false;
    if (won) {
      self.postMessage({ type: 'end', won: true, score, length: snake.length });
    } else {
      // Trigger death flash; overlay posted after animation completes
      dying        = true;
      dyingStartTs = currentTs;
    }
  }

  // ── Particles ────────────────────────────────────────────────────────────────
  const PARTICLE_COLORS = ['#f87171','#fb923c','#fbbf24','#f43f5e','#fff'];

  function spawnParticles(cx, cy) {
    for (let i = 0; i < 14; i++) {
      const angle = (Math.PI * 2 * i / 14) + Math.random() * 0.4;
      const speed = 1.5 + Math.random() * 2.5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: 0.018 + Math.random() * 0.018,
        r: 2 + Math.random() * 3,
        color: PARTICLE_COLORS[(Math.random() * PARTICLE_COLORS.length) | 0],
      });
    }
  }

  function updateParticles(dt) {
    const step = dt / 16; // normalise to ~60fps
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x    += p.vx * step;
      p.y    += p.vy * step;
      p.vy   += 0.08 * step;  // gravity
      p.life -= p.decay * step;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Floating texts ───────────────────────────────────────────────────────────
  function updateFloatingTexts(dt) {
    const step = dt / 16;
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const f = floatingTexts[i];
      f.y    += f.vy * step;
      f.life -= 0.018 * step;
      if (f.life <= 0) floatingTexts.splice(i, 1);
    }
  }

  function drawFloatingTexts() {
    floatingTexts.forEach(f => {
      ctx.globalAlpha = f.life;
      ctx.font        = f.combo > 1
        ? \`bold \${13 + f.combo * 1.5}px "Courier New"\`
        : 'bold 13px "Courier New"';
      ctx.textAlign    = 'center';
      ctx.fillStyle    = f.combo > 1 ? '#facc15' : '#fff';
      ctx.fillText(f.text, f.x, f.y);
    });
    ctx.globalAlpha = 1;
    ctx.textAlign   = 'left';
  }

  // ── Death flash ──────────────────────────────────────────────────────────────
  function drawDying(ts) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawApple();
    drawParticles();

    // Flash between red and dark red using sine wave
    const elapsed = ts - dyingStartTs;
    const phase   = Math.sin(elapsed / 55 * Math.PI);
    const pad = 2, w = CELL - pad * 2, h = CELL - pad * 2;
    snake.forEach(seg => {
      const x = seg.x * CELL + pad;
      const y = seg.y * CELL + pad;
      ctx.fillStyle   = phase > 0 ? '#ef4444' : '#7f1d1d';
      ctx.globalAlpha = 0.6 + Math.abs(phase) * 0.4;
      roundRect(x, y, w, h, 4); ctx.fill();
    });
    ctx.globalAlpha = 1;
    drawFloatingTexts();
  }

  // ── Draw ────────────────────────────────────────────────────────────────────
  // t ∈ [0,1): interpolation factor between prevSnake and snake.
  // Rendering happens every rAF frame (~16ms), game logic every 120ms.
  function draw(t = 1) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawApple();
    drawSnakeInterp(t);
    drawParticles();
    drawFloatingTexts();
  }

  function drawEmpty() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
  }

  function drawGrid() {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }
  }

  function drawApple() {
    if (!apple) return;
    const ax = apple.x * CELL + CELL / 2;
    const ay = apple.y * CELL + CELL / 2;
    const r  = CELL / 2 - 3;
    ctx.beginPath(); ctx.arc(ax, ay, r, 0, Math.PI * 2);
    ctx.fillStyle = '#f87171'; ctx.fill();
    ctx.beginPath(); ctx.arc(ax - r * 0.25, ay - r * 0.25, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
  }

  function drawSnakeInterp(t) {
    // Smoothstep easing: slow start, fast middle, slow end.
    // Makes movement feel organic instead of robotic/linear.
    // Formula: 3t² - 2t³  (maps 0→0, 0.5→0.5, 1→1 with zero derivatives at endpoints)
    const s = t * t * (3 - 2 * t);

    const len = snake.length;
    const pad = 2;
    const w   = CELL - pad * 2;
    const h   = CELL - pad * 2;

    snake.forEach((seg, i) => {
      // Interpolate from previous position (or current if segment is new)
      const prev = prevSnake[i] ?? seg;
      const rx = (prev.x + (seg.x - prev.x) * s) * CELL + pad;
      const ry = (prev.y + (seg.y - prev.y) * s) * CELL + pad;

      const brightness = 1 - i / len;   // 1 at head, ~0 at tail
      const g = (174 + brightness * 60) | 0;
      ctx.fillStyle = i === 0 ? '#a3e635' : \`rgb(30,\${g},60)\`;
      roundRect(rx, ry, w, h, 4); ctx.fill();
      if (i === 0) drawEyes(rx, ry, w, h);
    });

    // Draw the vanishing tail: the last segment of prevSnake glides away
    // as the snake moves forward (only when snake didn't grow this tick).
    if (prevSnake.length === snake.length && snake.length > 1) {
      const tail = prevSnake[prevSnake.length - 1];
      const ref  = prevSnake[prevSnake.length - 2]; // segment it was following
      const rx = (tail.x + (ref.x - tail.x) * s) * CELL + pad;
      const ry = (tail.y + (ref.y - tail.y) * s) * CELL + pad;
      ctx.globalAlpha = 1 - s;  // fades out as next tick approaches
      ctx.fillStyle = 'rgb(30,174,60)';
      roundRect(rx, ry, w, h, 4); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawEyes(x, y, w, h) {
    ctx.fillStyle = '#0f0f0f';
    const ex = CELL * 0.22, ey = CELL * 0.22, er = 2.5;
    let e1x, e1y, e2x, e2y;
    if      (dir.x ===  1) { e1x = x+w-ex; e1y = y+ey;   e2x = x+w-ex; e2y = y+h-ey; }
    else if (dir.x === -1) { e1x = x+ex;   e1y = y+ey;   e2x = x+ex;   e2y = y+h-ey; }
    else if (dir.y === -1) { e1x = x+ex;   e1y = y+ey;   e2x = x+w-ex; e2y = y+ey;   }
    else                   { e1x = x+ex;   e1y = y+h-ey; e2x = x+w-ex; e2y = y+h-ey; }
    ctx.beginPath(); ctx.arc(e1x, e1y, er, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x, e2y, er, 0, Math.PI * 2); ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h,  x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y,    x+r, y);
    ctx.closePath();
  }

  function postHud() {
    self.postMessage({ type: 'hud', score, best, length: snake.length, combo });
  }
`;

// ── Local ranking (localStorage) ─────────────────────────────────────────────
const LS_KEY = 'snake_top5';

function loadRanking() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) ?? []; }
  catch { return []; }
}

function saveToRanking(score, length) {
  if (score === 0) return loadRanking();
  const entries = loadRanking();
  entries.push({ score, length, date: new Date().toLocaleDateString('pt-BR') });
  entries.sort((a, b) => b.score - a.score);
  const top5 = entries.slice(0, 5);
  localStorage.setItem(LS_KEY, JSON.stringify(top5));
  return top5;
}

function renderRanking(entries, highlightScore = null) {
  const el = document.getElementById('ranking');
  if (!entries.length) { el.innerHTML = ''; return; }
  const medals = ['🥇', '🥈', '🥉'];
  // Mark only the first occurrence of highlightScore as new
  let marked = false;
  const items = entries.map((e, i) => {
    const isNew = !marked && highlightScore !== null && e.score === highlightScore;
    if (isNew) marked = true;
    const pos = medals[i] ?? `${i + 1}.`;
    return `<li${isNew ? ' class="new"' : ''}>
      <span><span class="pos">${pos}</span><span class="pts">${e.score}</span></span>
      <span class="meta">${e.length} cells · ${e.date}</span>
    </li>`;
  }).join('');
  el.innerHTML = `<h3>TOP 5</h3><ol>${items}</ol>`;
}

// ── Spawn worker from inline source ──────────────────────────────────────────
const workerBlob = new Blob([WORKER_SRC], { type: 'application/javascript' });
const worker     = new Worker(URL.createObjectURL(workerBlob));

// Transfer canvas control to the worker thread (OffscreenCanvas)
const offscreen = canvas.transferControlToOffscreen();
worker.postMessage({ type: 'init', canvas: offscreen }, [offscreen]);

// Restore best score and ranking from previous sessions
const savedRanking = loadRanking();
if (savedRanking.length) {
  bestEl.textContent = savedRanking[0].score;
  renderRanking(savedRanking);
}

// ── Worker → main thread messages ────────────────────────────────────────────
worker.onmessage = ({ data }) => {
  if (data.type === 'hud') {
    scoreEl.textContent = data.score;
    bestEl.textContent  = data.best;
    cellsEl.textContent = `${data.length} / ${TOTAL}`;
    const comboEl = document.getElementById('combo');
    comboEl.textContent = `x${data.combo}`;
    comboEl.classList.toggle('hot', data.combo > 1);
    if (data.combo > 1) { clearTimeout(comboEl._t); comboEl._t = setTimeout(() => comboEl.classList.remove('hot'), 300); }
  } else if (data.type === 'end') {
    if (data.won) {
      overlayTitle.textContent = 'YOU WIN!';
      overlayTitle.style.color = '#facc15';
      overlayMsg.textContent   = `Perfect score! You filled all ${TOTAL} cells.`;
    } else {
      overlayTitle.textContent = 'GAME OVER';
      overlayTitle.style.color = '#f87171';
      overlayMsg.textContent   = `Score: ${data.score}  —  Snake length: ${data.length}`;
    }
    const top5 = saveToRanking(data.score, data.length);
    renderRanking(top5, data.score);
    bestEl.textContent    = top5[0]?.score ?? 0;
    startBtn.textContent  = 'PLAY AGAIN';
    overlay.style.display = 'flex';
    rafActive = false;
  }
};

// ── Keyboard input ────────────────────────────────────────────────────────────
// keydown fires immediately (no tick delay). We capture it into pendingDir,
// which is sent to the worker on the very next rAF frame (~≤16 ms).
const KEY_DIR = {
  ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
  ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
  ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 }, A: { x:-1, y:  0 },
  ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
};

let pendingDir = null;

document.addEventListener('keydown', e => {
  const d = KEY_DIR[e.key];
  if (!d) return;
  pendingDir = d;  // captured immediately; sent to worker on next rAF
  e.preventDefault();
});

// ── Gamepad API ───────────────────────────────────────────────────────────────
// Gamepads have no events — must be polled each rAF frame.
window.addEventListener('gamepadconnected',    () => { gpStatus.textContent = 'GAMEPAD'; gpStatus.classList.add('on'); });
window.addEventListener('gamepaddisconnected', () => { gpStatus.textContent = 'NO GAMEPAD'; gpStatus.classList.remove('on'); });

function readGamepad() {
  const gp = [...(navigator.getGamepads?.() ?? [])].find(g => g?.connected);
  if (!gp) return null;
  // D-pad buttons (12–15) and left analog stick (axes 0/1)
  if (gp.buttons[12]?.pressed || gp.axes[1] < -0.5) return { x:  0, y: -1 };
  if (gp.buttons[13]?.pressed || gp.axes[1] >  0.5) return { x:  0, y:  1 };
  if (gp.buttons[14]?.pressed || gp.axes[0] < -0.5) return { x: -1, y:  0 };
  if (gp.buttons[15]?.pressed || gp.axes[0] >  0.5) return { x:  1, y:  0 };
  return null;
}

// ── requestAnimationFrame loop ────────────────────────────────────────────────
// Runs at monitor refresh rate (60/120/144 Hz).
// Forwards timestamp + current input to the worker each frame.
// The worker's delta-time accumulator decides when a game tick fires.
let rafActive = false;

function rafLoop(ts) {
  if (!rafActive) return;
  // Keyboard takes priority; fall back to gamepad
  const dir = pendingDir ?? readGamepad();
  pendingDir = null;  // consume — next frame starts fresh

  worker.postMessage({ type: 'frame', ts, dir });
  requestAnimationFrame(rafLoop);
}

// ── Speed selector ────────────────────────────────────────────────────────────
// Maps level 1-10 → tick interval in ms (250ms slow … 50ms fast)
function levelToTickMs(level) {
  return Math.round(250 - (level - 1) * 200 / 9);
}

let selectedLevel = 5;

document.getElementById('speed-btns').addEventListener('click', e => {
  const btn = e.target.closest('[data-level]');
  if (!btn) return;
  selectedLevel = Number(btn.dataset.level);
  document.querySelectorAll('#speed-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

// ── Touch / swipe input ───────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return; // tap — ignore
  if (Math.abs(dx) > Math.abs(dy)) {
    pendingDir = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
  } else {
    pendingDir = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
  }
  e.preventDefault();
}, { passive: false });

// ── D-pad input ───────────────────────────────────────────────────────────────
const DPAD_DIRS = {
  'dpad-up':    { x: 0, y: -1 },
  'dpad-down':  { x: 0, y:  1 },
  'dpad-left':  { x: -1, y: 0 },
  'dpad-right': { x:  1, y: 0 },
};

document.getElementById('dpad').addEventListener('pointerdown', e => {
  const btn = e.target.closest('[id^="dpad-"]');
  if (!btn) return;
  pendingDir = DPAD_DIRS[btn.id] ?? null;
  e.preventDefault();
});

// ── Start / restart ───────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  rafActive = true;
  requestAnimationFrame(ts => {
    worker.postMessage({ type: 'start', ts, tickMs: levelToTickMs(selectedLevel) });
    requestAnimationFrame(rafLoop);
  });
});
</script>
</body>
</html>
