# Workflow: run the full test suite on every pull request and branch push
name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright Chromium binary to avoid re-downloading ~100 MB every run
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      # Download the browser only on a cache miss; system deps are always installed
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      # System libraries (libglib, libnss, etc.) must be present on every fresh runner
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      # Fast unit tests: game logic, speed formula, swipe detection, key mappings
      - name: Unit tests (Vitest)
        run: npm test

      # Browser tests: layout, mobile viewports, touch, accessibility, game flow
      - name: E2E tests (Playwright)
        run: npm run test:e2e
