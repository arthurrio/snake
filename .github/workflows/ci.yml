# Workflow: run the full test suite on every pull request and branch push
name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fast unit tests: game logic, speed formula, swipe detection, key mappings
      - name: Unit tests (Vitest)
        run: npm test

      # Download Chromium and required system libraries for Playwright
      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium

      # Browser tests: layout, mobile viewports, touch, accessibility, game flow
      - name: E2E tests (Playwright)
        run: npm run test:e2e
